apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.service.name }}
spec:
  serviceName: "{{ .Values.service.name }}"
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.service.name }}
    spec:
      # <-- initContainers ici, au même niveau que containers
      initContainers:
        - name: init-mysql-data
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/mysql/data
              chown -R 999:999 /var/lib/mysql
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      containers:
        - name: mysql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-root-secret
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - containerPort: 3306
              name: mysql
          args:
            - "--authentication-policy=caching_sha2_password"
            - "--character-set-server=utf8mb4"
            - "--collation-server=utf8mb4_0900_ai_ci"
            - "--datadir=/var/lib/mysql/data"
            - "--innodb-buffer-pool-size=256m"
            - "--innodb-io-capacity=10000"
            - "--innodb-io-capacity-max=20000"
            - "--innodb-purge-threads=1"
            - "--innodb-read-io-threads=4"
            - "--innodb-write-io-threads=4"
            - "--max-connections=683"
            - "--max-connect-errors=100"
            - "--long-query-time=10"
            - "--wait-timeout=28800"
            - "--thread-cache-size=14"
            - "--tmp-table-size=16777216"
            - "--connect-timeout=10"
            - "--innodb-default-row-format=DYNAMIC"
            - "--innodb-redo-log-capacity=536870912"
            - "--lower-case-table-names=1"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
{{ toYaml .Values.resources | indent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
