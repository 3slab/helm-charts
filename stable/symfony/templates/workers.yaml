{{- range $worker := $.Values.workers }}
{{- if $worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{- $.Release.Name -}}-{{- $worker.name -}}"
  labels:
    app: "{{- $.Release.Name -}}-{{- $worker.name -}}"
    release: {{ $.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
    app.kubernetes.io/instance: {{ $.Release.Name | quote }}
    helm.sh/chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    symfony.io/type: worker
    {{- if $worker.labels }}
{{ $worker.labels | toYaml | indent 4 }}
    {{- end }}
    {{- if $worker.inheritLabels }}
    # inherit labels from deployment
    {{- if $.Values.labels}}
{{ toYaml $.Values.labels | indent 4 }}
    {{- end }}
    {{- end }}
  annotations:
    tags.datadoghq.com/version: "{{  $.Values.image.tag }}"
    tags.datadoghq.com/service: "{{ .Release.Name }}"
    ad.datadoghq.com/tags: '{"chart-name":"{{ .Chart.Name }}"}'
{{- if $worker.annotations }}
{{ $worker.annotations | toYaml | indent 6 }}
{{- end }}
{{- if $worker.inheritAnnotations }}
# inherit annotations from deployment
{{- if $.Values.annotations }}
{{ $.Values.annotations | toYaml | indent 6 }}
{{- end }}

  {{- end }}
spec:
  selector:
    matchLabels:
      app: "{{- $.Release.Name -}}-{{- $worker.name -}}"
      release: {{ $.Release.Name | quote }}
  replicas: {{ $worker.replicaCount }}
  {{- if $worker.revisionHistoryLimit }}
  revisionHistoryLimit: {{ $worker.revisionHistoryLimit }}
  {{- end }}
  template:
    metadata:
      labels:
        app: "{{- $.Release.Name -}}-{{- $worker.name -}}"
        release: {{ $.Release.Name | quote }}
        app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
        app.kubernetes.io/instance: {{ $.Release.Name | quote }}
        helm.sh/chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
        symfony.io/type: worker
{{- if $worker.labels }}
{{ $worker.labels | toYaml | replace "<CONTAINER_NAME>" ( printf "%s-%s" $.Release.Name $worker.name ) | indent 8 }}
{{- end }}
{{- if $worker.inheritLabels }}
# inherit annotations from deployment
{{- if $.Values.template.labels }}
{{ $.Values.template.labels | toYaml | replace "<CONTAINER_NAME>" ( printf "%s-%s" $.Release.Name $worker.name ) | indent 8 }}
{{- end }}
{{- end }}
      annotations:
        tags.datadoghq.com/version: "{{  $.Values.image.tag }}"
        tags.datadoghq.com/service: "{{ .Release.Name }}"
        ad.datadoghq.com/tags: '{"chart-name":"{{ .Chart.Name }}"}'
        ad.datadoghq.com/{{- $.Release.Name -}}-{{- $worker.name -}}.logs: '[{"source":"symfony-cli"}]'
{{- if $worker.annotations }}
{{ $worker.annotations | toYaml | replace "<CONTAINER_NAME>" ( printf "%s-%s" $.Release.Name $worker.name ) | indent 8 }}
{{- end }}
{{- if $worker.inheritAnnotations }}
# inherit annotations from deployment
{{- if $.Values.template.annotations }}
{{ $.Values.template.annotations | toYaml | replace "<CONTAINER_NAME>" ( printf "%s-%s" $.Release.Name $worker.name ) | indent 8 }}
{{- end }}
{{- end }}

    spec:
      {{- if $.Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range $secret := $.Values.image.pullSecrets }}
        - name: {{ $secret }}
        {{- end }}
      {{- end }}
      containers:
        - name: "{{- $.Release.Name -}}-{{- $worker.name -}}"
          image: {{ $.Values.image.repository }}:{{ $.Values.image.tag }}
          imagePullPolicy: {{ $.Values.image.pullPolicy | quote }}
          {{- with $.Values.resources }}
          resources:
{{ toYaml . | indent 16 }}
          {{- end }}
          {{- if or $.Values.env $.Values.extraEnv $worker.env }}
          env:
          {{- include "merge-env-lists" (dict "containerEnv" $.Values.env.container "serviceEnv" $worker.env "extraEnv" $.Values.extraEnv) | nindent 12 }}          {{- end }}
          {{- with $worker.command }}
          command:
{{ toYaml . | indent 16 }}
          {{- end }}
          {{- with $worker.args }}
          args:
{{ toYaml . | indent 16 }}
          {{- end }}
          {{- $rootVolumeMounts := and $.Values.volumeMounts $worker.mountRootVolumes }}
          {{- if or $worker.volumeMounts $rootVolumeMounts  }}
          volumeMounts:
            {{- with $worker.volumeMounts }}
{{ toYaml . | indent 16 }}
            {{- end }}
            {{- if $worker.mountRootVolumes }}
                {{- with $.Values.volumeMounts }}
{{ toYaml . | indent 12 }}
                {{- end }}
            {{- end }}
          {{- end }}
      {{- $rootVolumes := and $.Values.volumes $worker.mountRootVolumes }}
      {{- if or $worker.volumes $rootVolumes }}
      volumes:
        {{- with $worker.volumes }}
{{ toYaml . | indent 12 }}
        {{- end }}
        {{- if $worker.mountRootVolumes }}
          {{- with $.Values.volumes }}
{{ toYaml . | indent 12 }}
          {{- end }}
        {{- end }}
      {{- end }}
...
{{- end }}
{{- end }}
